# Application
spring.application.name=gymflow-api
server.port=8080

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gymflow}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:gymflow}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:gymflow_secret_2024}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# JWT
jwt.secret=${JWT_SECRET:gymflow-jwt-secret-key-2024-very-long-and-secure}
jwt.expiration=${JWT_EXPIRATION:86400000}

# File uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Logging
logging.level.com.gymflow=DEBUG
logging.level.org.springframework.security=INFO
